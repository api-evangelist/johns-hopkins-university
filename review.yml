  - date: '2026-06-03'
    rating: 3
    summary: >-
      JHU has a genuine, documented public API footprint. The Hub API
      (api.hub.jhu.edu/docs) and the Self-Service Public Course Search API
      (sis.jhu.edu/api) are both documented and live; both require an API key, and
      Hub key issuance is limited to JHU affiliates. The central api.jh.edu portal
      resolves but is a gated MuleSoft Anypoint platform for affiliates only. No
      endpoints were fabricated: SIS /api/classes returned 500 when probed without a
      key (expected), and the Hub docs path 302-redirects. Rating reflects real but
      partly gated, key-restricted access.
    endpoints:
      - url: https://api.jh.edu/
        status: 200
        note: Central MuleSoft API Portal; gated to JHU affiliates.
      - url: https://api.hub.jhu.edu/docs/
        status: 302
