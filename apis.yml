apis:
  - aid: johns-hopkins-university:hub
    name: JHU Hub API
    description: >-
      REST API exposing data from the Hub database, a central repository of news
      articles, announcements, photo galleries, faculty experts, and events. Built
      to power the Hub website and reused across JHU schools, divisions, and
      centers. Access requires requesting a key as a JHU affiliate.
    humanURL: https://api.hub.jhu.edu/docs/
    baseURL: https://api.hub.jhu.edu
    tags: [ News, Events, Faculty Experts, Content ]
