aid: johns-hopkins-university
name: Johns Hopkins University
description: >-
  Johns Hopkins University is a private research university in Baltimore, Maryland,
  ranked #22 in the QS World University Rankings 2025. It maintains a real public
  developer footprint: the Hub API serves news, announcements, events, photo
  galleries, and faculty experts from the university Hub database, and the
  Self-Service Public Course Search API (SIS) returns course catalog data in JSON.
  A central MuleSoft-based API Portal (api.jh.edu) governs integration APIs but is
  gated to JHU affiliates. The university also operates numerous public GitHub
  organizations across its libraries, data services, and research centers.
