      - type: Documentation
        url: https://api.hub.jhu.edu/docs/
  - aid: johns-hopkins-university:sis-course-search
    name: Self-Service Public Course Search API (SIS)
    description: >-
      Returns, in JSON, the list of courses available through the JHU Public Course
      Search. Results can be filtered by school, department, course number, section
      number, and academic term, or via a custom query string. All requests require
      an API key parameter.
    humanURL: https://sis.jhu.edu/api
